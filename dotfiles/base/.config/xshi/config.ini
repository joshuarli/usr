[env]
TERM = screen
PATH = $HOME/usr/bin:/opt/homebrew/opt/rustup/bin:$HOME/dev/tools/bin:$HOME/.local/bin:$HOME/.cargo/bin:$HOME/go/bin:/opt/homebrew/bin:$PATH
EDITOR = $HOME/usr/bin/e
PAGER = less
LS_COLORS = su=00:sg=00:ca=00:or=40;31;01:
XDG_CONFIG_HOME = $HOME/.config
XDG_CACHE_HOME = $HOME/.cache
XDG_DATA_HOME = $HOME/.local/share
HOMEBREW_NO_AUTO_UPDATE = 1
HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK = 1
HOMEBREW_NO_INSTALL_CLEANUP = 1
HOMEBREW_NO_ANALYTICS = 1
CARGO_NET_GIT_FETCH_WITH_CLI = true

[aliases]
e = $HOME/usr/bin/e
p = /Applications/Play.app/Contents/MacOS/play
fd = fd --prune
fdh = fd --prune --no-ignore-vcs -H -E '.git/'
rg = rg -S
rgh = rg --hidden -S -g '!.git'
du = duf
pp = procs
syncthing = syncthing serve --no-port-probing --no-browser --no-upgrade --gui-address='http://127.0.0.1:6969'
wol = $HOME/usr/bin/wol 7c:83:34:bd:05:c4
tu = /Applications/Tailscale.app/Contents/MacOS/Tailscale up
td = /Applications/Tailscale.app/Contents/MacOS/Tailscale down
grt = cd "$(git rev-parse --show-toplevel)"
d = git diff --no-index
gaa = git add --all
gcm = git commit -m
gd = git d
gdd = git diff --name-only --diff-filter=U
gdc = git dc
gl = git l
gp = git push -u
grv = git remote -v
gs = git status -sb
gss = git status -sb -uall
tl = tmux -f "$XDG_CONFIG_HOME/tmux/tmux.conf" ls
tn = tmux -f "$XDG_CONFIG_HOME/tmux/tmux.conf" new -s
ta = tmux -f "$XDG_CONFIG_HOME/tmux/tmux.conf" a -t
tk = tmux -f "$XDG_CONFIG_HOME/tmux/tmux.conf" kill-session -t
.. = cd ..
