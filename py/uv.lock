version = 1
revision = 2
requires-python = "==3.13.3"

[[package]]
name = "lol"
version = "0.0.0"
source = { virtual = "." }
dependencies = [
    { name = "yt-dlp" },
]

[package.metadata]
requires-dist = [{ name = "yt-dlp", editable = "../src/yt-dlp" }]

[[package]]
name = "yt-dlp"
source = { editable = "../src/yt-dlp" }

[package.metadata]
requires-dist = [
    { name = "autopep8", marker = "extra == 'dev'", specifier = "~=2.0" },
    { name = "autopep8", marker = "extra == 'static-analysis'", specifier = "~=2.0" },
    { name = "brotli", marker = "implementation_name == 'cpython' and extra == 'default'" },
    { name = "brotlicffi", marker = "implementation_name != 'cpython' and extra == 'default'" },
    { name = "build", marker = "extra == 'build'" },
    { name = "certifi", marker = "extra == 'default'" },
    { name = "cffi", marker = "extra == 'secretstorage'" },
    { name = "curl-cffi", marker = "(platform_machine != 'armv7l' and sys_platform == 'linux' and extra == 'build-curl-cffi') or (sys_platform == 'darwin' and extra == 'build-curl-cffi')", specifier = "==0.13.0" },
    { name = "curl-cffi", marker = "(platform_machine == 'armv7l' and sys_platform == 'linux' and extra == 'build-curl-cffi') or (sys_platform == 'win32' and extra == 'build-curl-cffi')", specifier = "==0.14.0" },
    { name = "curl-cffi", marker = "implementation_name == 'cpython' and extra == 'curl-cffi'", specifier = ">=0.5.10,!=0.6.*,!=0.7.*,!=0.8.*,!=0.9.*,<0.15" },
    { name = "deno", marker = "extra == 'deno'", specifier = ">=2.6.6" },
    { name = "hatchling", marker = "extra == 'build'", specifier = ">=1.27.0" },
    { name = "mutagen", marker = "extra == 'default'" },
    { name = "pip", marker = "extra == 'build'" },
    { name = "pre-commit", marker = "extra == 'dev'" },
    { name = "pycryptodomex", marker = "extra == 'default'" },
    { name = "pyinstaller", marker = "extra == 'pyinstaller'", specifier = ">=6.17.0" },
    { name = "pytest", marker = "extra == 'dev'", specifier = "~=8.1" },
    { name = "pytest", marker = "extra == 'test'", specifier = "~=8.1" },
    { name = "pytest-rerunfailures", marker = "extra == 'dev'", specifier = "~=14.0" },
    { name = "pytest-rerunfailures", marker = "extra == 'test'", specifier = "~=14.0" },
    { name = "requests", marker = "extra == 'default'", specifier = ">=2.32.2,<3" },
    { name = "ruff", marker = "extra == 'dev'", specifier = "~=0.15.0" },
    { name = "ruff", marker = "extra == 'static-analysis'", specifier = "~=0.15.0" },
    { name = "secretstorage", marker = "extra == 'secretstorage'" },
    { name = "setuptools", marker = "extra == 'build'", specifier = ">=71.0.2" },
    { name = "urllib3", marker = "extra == 'default'", specifier = ">=2.0.2,<3" },
    { name = "websockets", marker = "extra == 'default'", specifier = ">=13.0" },
    { name = "wheel", marker = "extra == 'build'" },
    { name = "yt-dlp-ejs", marker = "extra == 'default'", specifier = "==0.5.0" },
]
provides-extras = ["build", "build-curl-cffi", "curl-cffi", "default", "deno", "dev", "pyinstaller", "secretstorage", "static-analysis", "test"]
